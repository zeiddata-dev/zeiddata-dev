name: Update Now Building

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "scripts/update_now_building.py"
      - ".github/workflows/update-now-building.yml"

permissions:
  contents: write

concurrency:
  group: update-now-building
  cancel-in-progress: false

jobs:
  update:
    name: Update profile activity section
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repo
        uses: actions/checkout@v4

      - name: Update Now Building section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_now_building.py
