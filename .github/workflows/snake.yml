name: Generate Contribution Art

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#d76233&color_dots=#f0ece3,#e8c37e,#c08a52,#d76233,#b5471f
            dist/github-contribution-grid-snake-dark.svg?color_snake=#d76233&color_dots=#20242c,#5f3b22,#b5471f,#d76233,#e8c37e

      - uses: actions/checkout@v7
        with:
          repository: Spectrewolf8/isometric-contributions-embeds
          ref: cb124be89e337784f3526af74a04677cd85c4164
          path: isometric

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Render isometric contribution graph
        working-directory: isometric
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo chown -R "$USER" ../dist
          npm ci
          # retheme the hardcoded default (github) palette to brand colors
          sed -i \
            -e 's/#24292f/#c08a52/g' \
            -e 's/#2BD853/#e8c37e/g' \
            -e 's/#2ea043/#d76233/g' \
            -e 's/#57606a/#8b93a1/g' \
            -e 's/#161b22/#20242c/g' \
            -e 's/#0e4429/#5f3b22/g' \
            -e 's/#006d32/#b5471f/g' \
            -e 's/#26a641/#d76233/g' \
            -e 's/#39d353/#e8c37e/g' \
            src/theme-config.js
          node generate.js "${{ github.repository_owner }}" "" ../dist/isometric-contributions.png --stats

      - name: Render commit clock
        env:
          GITHUB_TOKEN: ${{ secrets.COMMIT_CLOCK_TOKEN || secrets.GITHUB_TOKEN }}
          CLOCK_SCOPE: ${{ secrets.COMMIT_CLOCK_TOKEN != '' && 'all' || 'public' }}
        run: node scripts/commit-clock.mjs "${{ github.repository_owner }}" dist/commit-clock.svg

      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
