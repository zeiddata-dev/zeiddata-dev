name: Generate Contribution Art

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: actions/checkout@v4
        with:
          repository: Spectrewolf8/isometric-contributions-embeds
          ref: cb124be89e337784f3526af74a04677cd85c4164
          path: isometric

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render isometric contribution graph
        working-directory: isometric
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          node generate.js "${{ github.repository_owner }}" "" ../dist/isometric-contributions.png --stats

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
